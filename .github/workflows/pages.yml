name: Deploy MkDocs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      - name: Checkout gyms
        uses: actions/checkout@v4
        with:
          repository: Dylan-Liew/gyms
          path: content/gyms
          fetch-depth: 0

      - name: Checkout labs
        uses: actions/checkout@v4
        with:
          repository: Dylan-Liew/labs
          path: content/labs
          fetch-depth: 0

      - name: Checkout blogs
        uses: actions/checkout@v4
        with:
          repository: Dylan-Liew/blogs
          path: content/blogs
          fetch-depth: 0

      - name: Checkout projects
        uses: actions/checkout@v4
        with:
          repository: Dylan-Liew/projects
          path: content/projects
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: site/requirements.txt

      - name: Install dependencies
        working-directory: site
        run: pip install -r requirements.txt

      - name: Import external content
        working-directory: site
        run: python scripts/sync_content.py --content-root ../content

      - name: Build site
        working-directory: site
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
